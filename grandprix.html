<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1Track.com — Grand Prix Details</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--red:#E10600;--red2:#FF1801;--darker:#050505;--dark:#0a0a0a;--panel:#0e0e0e;--border:rgba(255,255,255,0.07);--silver:#b0b0b0;--white:#f0f0f0;--green:#22c55e;--amber:#f59e0b;--blue:#3b82f6;--teal:#00D2BE}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--darker);color:var(--white);font-family:'Rajdhani',sans-serif;min-height:100vh;cursor:none;overflow-x:hidden}
.cursor{position:fixed;width:10px;height:10px;background:var(--red);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen}
.cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(225,6,0,.45);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .15s ease}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);pointer-events:none;z-index:9000}

/* SIDEBAR */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:64px;background:rgba(8,8,8,.96);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:16px 0;z-index:500;backdrop-filter:blur(12px)}
.logo-txt{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:900;color:var(--red);text-align:center;line-height:1.1;margin-bottom:28px}
.nav-icon{width:44px;height:44px;border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:6px;cursor:pointer;transition:all .2s;color:rgba(255,255,255,.35);position:relative}
.nav-icon:hover,.nav-icon.active{background:rgba(225,6,0,.12);color:var(--red)}
.nav-icon.active::before{content:'';position:absolute;left:-1px;top:25%;bottom:25%;width:2px;background:var(--red);border-radius:0 2px 2px 0}
.nav-icon svg{width:20px;height:20px}
.sidebar-bottom{margin-top:auto}
.user-avatar{width:38px;height:38px;border-radius:50%;border:2px solid rgba(225,6,0,.4);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--red);cursor:pointer;background:rgba(225,6,0,.08)}

/* TOPBAR */
.topbar{position:fixed;top:0;left:64px;right:0;height:56px;background:rgba(8,8,8,.95);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px 0 24px;z-index:400;backdrop-filter:blur(12px)}
.topbar-left{display:flex;align-items:center;gap:16px}
.page-label{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px}
.page-label span{color:var(--red)}
.breadcrumb{display:flex;align-items:center;gap:8px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;color:rgba(255,255,255,.3)}
.breadcrumb span{color:rgba(255,255,255,.15)}
.topbar-right{display:flex;align-items:center;gap:16px}
.clock{font-family:'Share Tech Mono',monospace;font-size:13px;color:rgba(255,255,255,.4);letter-spacing:1px}
.topbar-btn{background:var(--red);border:none;color:#fff;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;padding:8px 18px;border-radius:3px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.topbar-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .4s}
.topbar-btn:hover{background:var(--red2);box-shadow:0 4px 16px rgba(225,6,0,.4);transform:translateY(-1px)}
.topbar-btn:hover::before{left:100%}

/* GP SWITCHER in topbar */
.gp-switcher{display:flex;gap:6px}
.gp-tab{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;padding:5px 12px;border:1px solid rgba(255,255,255,.1);border-radius:2px;background:transparent;color:rgba(255,255,255,.35);cursor:pointer;transition:all .2s}
.gp-tab:hover{border-color:rgba(255,255,255,.3);color:var(--white)}
.gp-tab.active{border-color:var(--red);color:var(--red);background:rgba(225,6,0,.08)}

/* MAIN */
.main{margin-left:64px;padding-top:56px;min-height:100vh}
.content{padding:28px;display:grid;gap:20px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* PANEL */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;position:relative}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--red),transparent)}
.ph{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;border-bottom:1px solid var(--border)}
.pt{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px}
.ptag{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--red);background:rgba(225,6,0,.1);padding:3px 8px;border-radius:2px}
.pb{padding:16px 18px}

/* ══ HERO SECTION ══ */
.hero-section{position:relative;overflow:hidden;background:linear-gradient(135deg,#160000 0%,#0a0000 50%,#060606 100%);border:1px solid var(--border);border-radius:6px;padding:0;animation:fadeUp .5s ease both}
.hero-section::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--red),var(--red2),rgba(255,255,255,.1),transparent)}
.hero-inner{display:grid;grid-template-columns:1fr 420px;min-height:260px}
.hero-left{padding:32px 36px;display:flex;flex-direction:column;justify-content:space-between;position:relative;z-index:2}
.hero-bg-num{position:absolute;right:0;top:-30px;font-family:'Orbitron',sans-serif;font-weight:900;font-size:200px;color:var(--red);opacity:.03;line-height:1;user-select:none;pointer-events:none}
.hero-eyebrow{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.hero-round{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:4px;color:var(--red)}
.hero-season-badge{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.3);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:3px 10px;border-radius:2px}
.hero-flag{font-size:48px;line-height:1;margin-bottom:10px}
.hero-gp-name{font-family:'Orbitron',sans-serif;font-size:36px;font-weight:900;line-height:1.05;margin-bottom:6px;letter-spacing:-1px}
.hero-circuit-name{font-size:16px;color:rgba(255,255,255,.4);font-weight:300;margin-bottom:24px}
.hero-quick-stats{display:flex;gap:24px}
.hqs{border-left:2px solid rgba(225,6,0,.4);padding-left:12px}
.hqs-val{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700}
.hqs-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.3);margin-top:2px}

/* HERO RIGHT — track map */
.hero-right{position:relative;overflow:hidden;border-left:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3)}
.track-container{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:20px}
.track-label-corner{position:absolute;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;color:rgba(255,255,255,.2);pointer-events:none}

/* TRACK SVG */
.track-svg{width:100%;height:100%;max-height:220px}
.track-path{fill:none;stroke:rgba(255,255,255,.12);stroke-width:12;stroke-linecap:round;stroke-linejoin:round}
.track-path-inner{fill:none;stroke:var(--red);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:.8}
.track-sector-1{fill:none;stroke:#E10600;stroke-width:12;stroke-linecap:round;stroke-linejoin:round;opacity:.9}
.track-sector-2{fill:none;stroke:#f59e0b;stroke-width:12;stroke-linecap:round;stroke-linejoin:round;opacity:.9}
.track-sector-3{fill:none;stroke:#22c55e;stroke-width:12;stroke-linecap:round;stroke-linejoin:round;opacity:.9}
.start-marker{fill:var(--white);opacity:.8}
.drs-zone{fill:none;stroke:#00D2BE;stroke-width:4;opacity:.6;stroke-dasharray:8 4}

/* ── ROW 1 ── */
.row-main{display:grid;grid-template-columns:1fr 1fr 1.2fr;gap:20px;animation:fadeUp .6s ease both}

/* RACE INFO */
.info-grid{display:flex;flex-direction:column;gap:0}
.info-row{display:flex;align-items:center;justify-content:space-between;padding:11px 4px;border-bottom:1px solid rgba(255,255,255,.04)}
.info-row:last-child{border-bottom:none}
.info-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.3)}
.info-val{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;text-align:right}
.info-val.mono{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px}
.info-val.red{color:var(--red)}
.info-val.green{color:var(--green)}
.info-val.amber{color:var(--amber)}

/* WEATHER */
.weather-main{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.weather-icon{font-size:52px;line-height:1}
.weather-temp{font-family:'Orbitron',sans-serif;font-size:38px;font-weight:900;color:var(--white);line-height:1}
.weather-unit{font-size:18px;color:rgba(255,255,255,.3)}
.weather-desc{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.4);margin-top:4px}
.weather-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.wg-item{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:4px;padding:9px 12px}
.wg-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.25);margin-bottom:3px}
.wg-val{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700}

/* PODIUM */
.podium-wrap{display:flex;flex-direction:column;gap:8px}
.podium-card{display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:5px;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);position:relative;overflow:hidden;transition:all .2s;cursor:pointer}
.podium-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.podium-card.p1::before{background:var(--amber)}
.podium-card.p2::before{background:var(--silver)}
.podium-card.p3::before{background:#cd7f32}
.podium-card:hover{border-color:rgba(255,255,255,.1);transform:translateX(3px)}
.pod-pos{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;width:32px;text-align:center;flex-shrink:0}
.p1 .pod-pos{color:var(--amber)}
.p2 .pod-pos{color:var(--silver)}
.p3 .pod-pos{color:#cd7f32}
.pod-helmet{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.pod-info{flex:1}
.pod-name{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;line-height:1.1}
.pod-abbr{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.35);margin-top:1px}
.pod-team{font-size:12px;color:rgba(255,255,255,.3);font-weight:300}
.pod-right{text-align:right;flex-shrink:0}
.pod-time{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.35);letter-spacing:1px}
.pod-pts{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--white);margin-top:3px}
.pod-pts-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(255,255,255,.25);letter-spacing:1px}

/* ── ROW 2 ── */
.row-bottom{display:grid;grid-template-columns:1.8fr 1fr;gap:20px;animation:fadeUp .7s ease both}

/* LAP CHART */
.lap-chart{position:relative;height:180px;overflow:hidden}
.lc-svg{width:100%;height:100%}
.lc-grid-line{stroke:rgba(255,255,255,.05);stroke-width:1}
.lc-line{fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.lc-label{font-family:'Share Tech Mono',monospace;font-size:8px;fill:rgba(255,255,255,.25);letter-spacing:1px}
.lc-legend{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.lc-leg-item{display:flex;align-items:center;gap:6px}
.lc-leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lc-leg-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;color:rgba(255,255,255,.4)}

/* SECTOR TIMES */
.sector-row{display:flex;flex-direction:column;gap:8px}
.sector-item{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:4px;padding:12px 14px;position:relative;overflow:hidden}
.sector-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.s1::before{background:var(--red)}.s2::before{background:var(--amber)}.s3::before{background:var(--green)}
.sector-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sector-name{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.3)}
.sector-time{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700}
.s1 .sector-time{color:var(--red)}.s2 .sector-time{color:var(--amber)}.s3 .sector-time{color:var(--green)}
.sector-bar-bg{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.sector-bar{height:100%;border-radius:2px;transition:width 1.4s cubic-bezier(.16,1,.3,1)}
.s1 .sector-bar{background:var(--red)}.s2 .sector-bar{background:var(--amber)}.s3 .sector-bar{background:var(--green)}
.sector-driver{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;color:rgba(255,255,255,.25);margin-top:5px}

/* ── ROW 3 ── */
.row-extra{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;animation:fadeUp .75s ease both}

/* FULL RESULTS TABLE */
.results-table{width:100%}
.rt-head{display:grid;grid-template-columns:28px 28px 1fr 60px 72px 56px;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.08)}
.rt-h{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.2)}
.rt-row{display:grid;grid-template-columns:28px 28px 1fr 60px 72px 56px;align-items:center;gap:8px;padding:9px 4px;border-bottom:1px solid rgba(255,255,255,.04);border-radius:3px;transition:background .15s;cursor:pointer}
.rt-row:hover{background:rgba(255,255,255,.03)}
.rt-row:last-child{border-bottom:none}
.rt-pos{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:rgba(255,255,255,.3);text-align:center}
.rt-pos.p1{color:var(--amber)}.rt-pos.p2{color:var(--silver)}.rt-pos.p3{color:#cd7f32}
.rt-flag{font-size:14px}
.rt-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600}
.rt-team{font-size:11px;color:rgba(255,255,255,.3);font-weight:300;margin-top:1px}
.rt-time{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.5);letter-spacing:1px}
.rt-pts{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;text-align:right}
.rt-laps{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.3);text-align:center}
.dnf-badge{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--red);background:rgba(225,6,0,.1);border:1px solid rgba(225,6,0,.2);padding:2px 6px;border-radius:2px}

/* DRS ZONES */
.drs-list{display:flex;flex-direction:column;gap:8px}
.drs-item{background:rgba(0,210,190,.05);border:1px solid rgba(0,210,190,.15);border-radius:4px;padding:11px 14px;display:flex;align-items:center;gap:12px}
.drs-num{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;color:var(--teal);width:30px;flex-shrink:0}
.drs-info{flex:1}
.drs-name{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--white)}
.drs-len{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--teal);margin-top:2px}
.drs-speed{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--teal)}
.drs-speed-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;color:rgba(0,210,190,.5)}

/* PIT STOP STATS */
.pit-stats{display:flex;flex-direction:column;gap:8px}
.pit-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:4px;transition:all .15s;cursor:pointer}
.pit-row:hover{border-color:rgba(255,255,255,.1)}
.pit-pos{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,255,255,.2);width:16px;text-align:right;flex-shrink:0}
.pit-driver{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;flex:1}
.pit-stop-time{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700}
.pit-stop-time.fast{color:var(--green)}
.pit-stop-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;color:rgba(255,255,255,.2)}
.pit-bar-wrap{width:60px;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.pit-bar{height:100%;background:var(--green);border-radius:2px}

/* REPLAY BTN */
.replay-section{animation:fadeUp .8s ease both}
.replay-btn-big{display:flex;align-items:center;justify-content:center;gap:16px;background:linear-gradient(135deg,var(--red) 0%,var(--red2) 100%);border:none;color:#fff;font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;letter-spacing:4px;padding:22px 40px;border-radius:5px;cursor:pointer;width:100%;transition:all .3s;position:relative;overflow:hidden}
.replay-btn-big::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transition:left .5s}
.replay-btn-big:hover{box-shadow:0 12px 40px rgba(225,6,0,.5);transform:translateY(-3px)}
.replay-btn-big:hover::before{left:100%}
.replay-icon{font-size:28px}
.replay-sub{font-size:11px;font-weight:400;letter-spacing:2px;opacity:.7;margin-top:3px}

/* BADGES */
.badge{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;padding:3px 8px;border-radius:2px}
.badge-green{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.badge-red{background:rgba(225,6,0,.1);color:var(--red);border:1px solid rgba(225,6,0,.2)}
.badge-amber{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.badge-teal{background:rgba(0,210,190,.1);color:var(--teal);border:1px solid rgba(0,210,190,.2)}

/* FASTEST LAP BANNER */
.fl-banner{background:linear-gradient(135deg,rgba(0,210,190,.08) 0%,rgba(0,210,190,.03) 100%);border:1px solid rgba(0,210,190,.2);border-radius:5px;padding:14px 18px;display:flex;align-items:center;gap:20px}
.fl-icon{font-size:28px}
.fl-info{flex:1}
.fl-label{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--teal);margin-bottom:4px}
.fl-driver{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700}
.fl-time{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px;color:rgba(255,255,255,.5);margin-top:2px}
.fl-lap{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--teal)}
.fl-lap-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(0,210,190,.5);margin-top:2px}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo-txt">F1<br>TRK</div>

      <rect class="start-marker" x="85" y="173" width="6" height="16" rx="1" transform="rotate(80,88,181)"/>
      <path class="drs-zone" d="M172,60 L220,58"/>

    </svg>`,

      <path class="track-sector-1" d="M60,170 L40,148 Q30,132 38,114 L58,88 Q68,72 62,55 Q56,38 70,28 L100,20"/>
      <path class="track-sector-2" d="M100,20 Q122,15 135,30 L148,48 Q160,64 180,66 Q200,68 212,52 Q224,36 244,40 L262,54 Q272,66 266,82"/>
      <path class="track-sector-3" d="M266,82 L250,106 Q240,122 248,138 L258,158 Q264,174 250,182 L220,192 Q200,198 185,186 L168,170 Q152,154 130,152 L100,152 Q82,152 72,166 L60,170"/>
      <rect class="start-marker" x="64" y="162" width="6" height="16" rx="1" transform="rotate(60,67,170)"/>
      <path class="drs-zone" d="M60,170 L40,148"/>
      <path class="drs-zone" d="M250,106 L266,82"/>
      <text x="100" y="215" fill="rgba(255,255,255,.15)" font-family="Orbitron,sans-serif" font-size="9" letter-spacing="2">SUZUKA</text>
    </svg>`,
    bahrain:`<svg class="track-svg" viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">
      <path class="track-path" d="M50,160 L50,120 Q50,100 68,92 L100,80 Q118,72 118,54 Q118,36 135,28 L165,22 Q185,18 195,34 L200,54 Q202,68 218,72 L248,76 Q265,80 265,98 L262,130 Q260,148 244,154 L215,162 Q198,166 194,182 L192,196 Q190,208 177,208 L100,206 Q80,206 68,192Z"/>
      <path class="track-sector-1" d="M50,160 L50,120 Q50,100 68,92 L100,80 Q118,72 118,54"/>
      <path class="track-sector-2" d="M118,54 Q118,36 135,28 L165,22 Q185,18 195,34 L200,54 Q202,68 218,72 L248,76 Q265,80 265,98"/>
      <path class="track-sector-3" d="M265,98 L262,130 Q260,148 244,154 L215,162 Q198,166 194,182 L192,196 Q190,208 177,208 L100,206 Q80,206 68,192 L50,160"/>
      <rect class="start-marker" x="46" y="152" width="6" height="16" rx="1" transform="rotate(90,49,160)"/>
      <path class="drs-zone" d="M50,140 L50,110"/>

  return tracks[id]||tracks.monaco;
}

// ── RENDER ─────────────────────────────────────────────
let currentGP='monaco';

function renderGP(id){
  currentGP=id;
  const gp=GPs[id];
  if(!gp)return;

  // breadcrumb
  document.getElementById('breadcrumbGP').textContent=gp.shortName;
  // topbar btn
  document.getElementById('replayTopBtn').textContent='▶ REPLAY '+gp.flag;

  // lap chart data
  const drivers=Object.keys(gp.lapData);
  const dColors=['#FF8000','#E10600','#1E41FF'];
  const allVals=drivers.flatMap(d=>gp.lapData[d]);
  const minV=Math.min(...allVals)-2, maxV=Math.max(...allVals)+2;
  const W=500,H=140,padL=30,padR=10,padT=10,padB=20;
  const pts=gp.lapData[drivers[0]].length;
  const xS=(W-padL-padR)/(pts-1), yS=(H-padT-padB)/(maxV-minV);
  const gridLines=[0,.25,.5,.75,1].map(f=>{
    const y=padT+(maxV-minV)*yS*f;
    return `<line class="lc-grid-line" x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}"/>`;
  }).join('');
  const paths=drivers.map((d,di)=>{
    const pts2=gp.lapData[d].map((v,i)=>`${padL+i*xS},${padT+(maxV-v)*yS}`).join(' L ');
    return `<polyline class="lc-line" points="${pts2}" style="stroke:${dColors[di]};opacity:${di===0?.9:.6}"/>`;
  }).join('');
  const xLabels=gp.lapData[drivers[0]].map((_,i)=>`<text class="lc-label" x="${padL+i*xS}" y="${H-4}" text-anchor="middle">L${i*Math.ceil(gp.laps/7)}</text>`).join('');
  const lcSVG=`<svg class="lc-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${gridLines}${paths}${xLabels}</svg>`;
  const lcLegend=drivers.map((d,di)=>`<div class="lc-leg-item"><div class="lc-leg-dot" style="background:${dColors[di]}"></div><div class="lc-leg-lbl">${d}</div></div>`).join('');

  document.getElementById('mainContent').innerHTML=`
  <!-- HERO -->
  <div class="hero-section" style="animation-delay:.0s">
    <div class="hero-inner">
      <div class="hero-left">
        <div class="hero-bg-num">${gp.round}</div>
        <div>
          <div class="hero-eyebrow">
            <div class="hero-round">ROUND ${String(gp.round).padStart(2,'0')} · ${gp.season} SEASON</div>
            <div class="hero-season-badge">FIA FORMULA ONE</div>
          </div>
          <div class="hero-flag">${gp.flag}</div>
          <div class="hero-gp-name">${gp.name}</div>
          <div class="hero-circuit-name">${gp.circuit} — ${gp.country}</div>
        </div>
        <div class="hero-quick-stats">
          <div class="hqs"><div class="hqs-val">${gp.laps}</div><div class="hqs-lbl">LAPS</div></div>
          <div class="hqs"><div class="hqs-val">${gp.distance}</div><div class="hqs-lbl">DISTANCE</div></div>
          <div class="hqs"><div class="hqs-val">${gp.corners}</div><div class="hqs-lbl">CORNERS</div></div>
          <div class="hqs"><div class="hqs-val">${gp.drsZones}</div><div class="hqs-lbl">DRS ZONES</div></div>
        </div>
      </div>
      <div class="hero-right">
        <div class="track-container">
          ${getTrackSVG(gp.trackSVG)}
          <div style="position:absolute;bottom:12px;left:14px;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.2)">SECTOR <span style="color:var(--red)">■</span> <span style="color:var(--amber)">■</span> <span style="color:var(--green)">■</span></div>
          <div style="position:absolute;top:12px;right:14px;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--teal)">DRS ══</div>
        </div>
      </div>
    </div>
  </div>

  <!-- FASTEST LAP BANNER -->
  <div class="fl-banner" style="animation:fadeUp .55s ease both">
    <div class="fl-icon">⚡</div>
    <div class="fl-info">
      <div class="fl-label">FASTEST LAP</div>
      <div class="fl-driver">${gp.fastestLap.driver} <span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(255,255,255,.3)">· ${gp.fastestLap.team}</span></div>
      <div class="fl-time">${gp.fastestLap.time}</div>
    </div>
    <div style="text-align:right;padding-right:8px">
      <div class="fl-lap">${gp.fastestLap.lap}</div>
      <div class="fl-lap-lbl">LAP</div>
    </div>
    <div style="text-align:right">
      <div style="font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.2);margin-bottom:4px">CIRCUIT RECORD</div>
      <div style="font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700">${gp.lapRecord}</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;color:rgba(255,255,255,.3);margin-top:2px">${gp.lapRecordDriver} · ${gp.lapRecordYear}</div>
    </div>
  </div>

  <!-- ROW 1 -->
  <div class="row-main">
    <!-- Race Info -->
    <div class="panel" style="animation:fadeUp .6s ease both">
      <div class="ph"><span class="pt">RACE INFORMATION</span><span class="ptag">RND ${gp.round}</span></div>
      <div class="pb">
        <div class="info-grid">${gp.info.map(r=>`
          <div class="info-row">
            <div class="info-lbl">${r.lbl}</div>
            <div class="info-val ${r.cls||''}">${r.val}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Weather -->
    <div class="panel" style="animation:fadeUp .63s ease both">
      <div class="ph"><span class="pt">RACE WEATHER</span><span class="ptag">${gp.date.toUpperCase()}</span></div>
      <div class="pb">
        <div class="weather-main">
          <div class="weather-icon">${gp.weather.icon}</div>
          <div>
            <div class="weather-temp">${gp.weather.temp}<span class="weather-unit">°C</span></div>
            <div class="weather-desc">${gp.weather.desc}</div>
          </div>
        </div>
        <div class="weather-grid">
          <div class="wg-item"><div class="wg-lbl">TRACK TEMP</div><div class="wg-val">${gp.weather.track}°C</div></div>
          <div class="wg-item"><div class="wg-lbl">HUMIDITY</div><div class="wg-val">${gp.weather.humidity}%</div></div>
          <div class="wg-item"><div class="wg-lbl">WIND</div><div class="wg-val" style="font-size:13px">${gp.weather.wind}</div></div>
          <div class="wg-item"><div class="wg-lbl">RAIN CHANCE</div><div class="wg-val" style="color:${gp.weather.rain>20?'var(--blue)':'var(--green)'}">${gp.weather.rain}%</div></div>
        </div>
      </div>
    </div>

    <!-- Podium -->
    <div class="panel" style="animation:fadeUp .66s ease both">
      <div class="ph"><span class="pt">RACE PODIUM</span><span class="ptag">TOP 3</span></div>
      <div class="pb">
        <div class="podium-wrap">${gp.podium.map(p=>`
          <div class="podium-card p${p.pos}">
            <div class="pod-pos">${p.pos}</div>
            <div class="pod-helmet" style="background:${p.teamColor}22;border:1px solid ${p.teamColor}44">${p.emoji}</div>
            <div class="pod-info">
              <div class="pod-name">${p.name}</div>
              <div class="pod-abbr">${p.abbr}</div>
              <div class="pod-team">${p.team}</div>
            </div>
            <div class="pod-right">
              <div class="pod-time">${p.time}</div>
              <div class="pod-pts">${p.pts}</div>
              <div class="pod-pts-lbl">PTS</div>
            </div>
          </div>`).join('')}
        </div>
      </div>
    </div>
  </div>

  <!-- ROW 2 -->
  <div class="row-bottom">
    <!-- Lap time chart -->
    <div class="panel" style="animation:fadeUp .68s ease both">
      <div class="ph"><span class="pt">LAP TIME COMPARISON</span><span class="ptag">TOP 3 DRIVERS</span></div>
      <div class="pb">
        <div class="lap-chart">${lcSVG}</div>
        <div class="lc-legend">${lcLegend}</div>
      </div>
    </div>

    <!-- Sector times -->
    <div class="panel" style="animation:fadeUp .71s ease both">
      <div class="ph"><span class="pt">SECTOR TIMES</span><span class="ptag">BEST OF RACE</span></div>
      <div class="pb">
        <div class="sector-row">${gp.sectors.map((s,i)=>`
          <div class="sector-item s${i+1}">
            <div class="sector-top">
              <div class="sector-name">${s.name}</div>
              <div class="sector-time">${s.time}</div>
            </div>
            <div class="sector-bar-bg"><div class="sector-bar" style="width:0%" data-w="${s.pct}%"></div></div>
            <div class="sector-driver">${gp.fastestLap.driver.split(' ')[1]||gp.fastestLap.abbr} · ${gp.fastestLap.team}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>
  </div>

  <!-- ROW 3 -->
  <div class="row-extra">
    <!-- Full results -->
    <div class="panel" style="animation:fadeUp .73s ease both;grid-column:1/3">
      <div class="ph"><span class="pt">FULL RACE RESULTS</span><span class="ptag">${gp.results.length} CLASSIFIED</span></div>
      <div class="pb" style="padding-top:8px">
        <div class="rt-head">
          <div class="rt-h">POS</div><div class="rt-h"></div><div class="rt-h">DRIVER</div>
          <div class="rt-h" style="text-align:right">TIME</div><div class="rt-h" style="text-align:right">PTS</div><div class="rt-h" style="text-align:center">LAPS</div>
        </div>
        <div class="results-table">${gp.results.map(r=>`
          <div class="rt-row">
            <div class="rt-pos ${r.pos<=3?'p'+r.pos:''}">${r.pos}</div>
            <div class="rt-flag">${r.flag}</div>
            <div>
              <div class="rt-name" style="border-left:2px solid ${r.tc};padding-left:8px">${r.name}</div>
              <div class="rt-team" style="padding-left:10px">${r.team}</div>
            </div>
            <div class="rt-time" style="text-align:right">${r.dnf?'<span class="dnf-badge">DNF</span>':r.time}</div>
            <div class="rt-pts" style="color:${r.pts>0?'var(--white)':'rgba(255,255,255,.3)'}">${r.pts}</div>
            <div class="rt-laps">${r.laps}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- DRS & Pits -->
    <div style="display:flex;flex-direction:column;gap:20px">
      <div class="panel" style="animation:fadeUp .76s ease both">
        <div class="ph"><span class="pt">DRS ZONES</span><span class="ptag">${gp.drsZones} ACTIVE</span></div>
        <div class="pb">
          <div class="drs-list">${gp.drs.map(d=>`
            <div class="drs-item">
              <div class="drs-num">${d.n}</div>
              <div class="drs-info"><div class="drs-name">${d.name}</div><div class="drs-len">${d.len}</div></div>
              <div style="text-align:right"><div class="drs-speed">${d.speed}</div><div class="drs-speed-lbl">MAX KM/H</div></div>
            </div>`).join('')}
          </div>
        </div>
      </div>

      <div class="panel" style="animation:fadeUp .79s ease both">
        <div class="ph"><span class="pt">FASTEST PIT STOPS</span><span class="ptag">TOP 5</span></div>
        <div class="pb">
          <div class="pit-stats">${gp.pits.map((p,i)=>`
            <div class="pit-row">
              <div class="pit-pos">${i+1}</div>
              <div class="pit-driver">${p.driver}</div>
              <div>
                <div class="pit-stop-time ${i===0?'fast':''}">${p.time}</div>
                <div class="pit-stop-lbl">PIT STOP</div>
              </div>
              <div class="pit-bar-wrap"><div class="pit-bar" style="width:0%;background:${i===0?'var(--green)':i===1?'var(--amber)':'rgba(255,255,255,.2)'}" data-w="${p.pct}%"></div></div>
            </div>`).join('')}
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- REPLAY BUTTON -->
  <div class="replay-section">
    <button class="replay-btn-big" id="replayMainBtn">
      <span class="replay-icon">▶</span>
      <div><div>REPLAY RACE</div><div class="replay-sub">${gp.name.toUpperCase()} · ${gp.season}</div></div>
    </button>
  </div>
  `;

  // animate bars
  setTimeout(()=>{
    document.querySelectorAll('.sector-bar[data-w],.pit-bar[data-w]').forEach(b=>{b.style.width=b.dataset.w;});
  },300);

  // hover events
  document.querySelectorAll('.podium-card,.rt-row,.pit-row,.replay-btn-big,.topbar-btn').forEach(el=>{
    el.addEventListener('mouseenter',hs);el.addEventListener('mouseleave',hr);
  });
  document.getElementById('replayMainBtn').addEventListener('click',()=>{
    const btn=document.getElementById('replayMainBtn');
    btn.style.background='linear-gradient(135deg,#c00 0%,#e10600 100%)';
    btn.innerHTML='<span class="replay-icon">⏸</span><div><div>LOADING REPLAY…</div><div class="replay-sub">PREPARING SESSION DATA</div></div>';
    setTimeout(()=>{
      btn.style.background='';
      btn.innerHTML='<span class="replay-icon">▶</span><div><div>REPLAY RACE</div><div class="replay-sub">'+GPs[currentGP].name.toUpperCase()+' · '+GPs[currentGP].season+'</div></div>';
    },2000);
  });
}

// ── GP SWITCHER ────────────────────────────────────────
function buildSwitcher(){
  const sw=document.getElementById('gpSwitcher');
  Object.values(GPs).forEach(gp=>{
    const btn=document.createElement('button');
    btn.className='gp-tab'+(gp.id===currentGP?' active':'');
    btn.textContent=gp.flag+' '+gp.shortName.replace(' GP','');
    btn.addEventListener('mouseenter',hs);btn.addEventListener('mouseleave',hr);
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.gp-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderGP(gp.id);
    });
    sw.appendChild(btn);
  });
}

buildSwitcher();
renderGP('monaco');
</script>
</body>
</html>
